name: DevSecOps CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Secret scan - Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: SAST PHP - PHPCS
        run: |
          composer require --dev squizlabs/php_codesniffer
          vendor/bin/phpcs --standard=PSR12 \
            --extensions=php --ignore=vendor .

  build:
    name: Build Container
    runs-on: ubuntu-latest
    needs: security
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t jly-projectbali:${{ github.sha }} .

      - name: Scan image - Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: jly-projectbali:${{ github.sha }}
          severity: CRITICAL,HIGH
          exit-code: "0"

  deploy:
    name: Deploy & Health Check
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy
        run: |
          docker compose up --build -d
          sleep 20

      - name: Health check
        run: |
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              http://localhost:8080/health.php)
            if [ "$STATUS" = "200" ]; then
              echo "✅ Health check OK"
              exit 0
            fi
            echo "Retry $i - status $STATUS"
            sleep 5
          done
          echo "❌ Health check gagal"
          docker compose logs app
          exit 1