name: DevSecOps CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Run unit tests
        run: echo "Running tests..."

  security:
    runs-on: ubuntu-latest
    steps:
      - name: Security scan
        run: echo "Running security scan..."

  build:
    runs-on: ubuntu-latest
    steps:
      - name: Build project
        run: echo "Building project..."

  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy project
        run: echo "Deploying project..."
